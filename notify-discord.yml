name: Notify Discord on Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          # DEIN WEBHOOK WURDE EINGEBAUT!
          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "content": "🚀 **Neues Dashboard Update!**\n\n**Version:** `'${GITHUB_REF_NAME}'`\n\n**Changelog:**\n'$(echo "${{ github.event.release.body }}" | sed ':a;N;$!ba;s/\n/\\n/g')'\n\n[Download von GitHub](https://github.com/princearmy2024/Emden-Network/releases/latest/download/EmdenNetworkSetup.exe)"
          }' \
          https://discord.com/api/webhooks/1487189165278756924/aYRVcnsC8YTq49rjMzs4VocunHsGAvSei3-webqm81tdNlyTVkPzb1w3WZOYatW-Ni_V
