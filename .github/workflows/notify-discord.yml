name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Premium Discord Notification
        if: success()
        shell: bash
        run: |
          # Wir erstellen eine JSON-Datei, um Flucht-Fehler (Quoting) zu vermeiden
          # Wir ziehen uns die Commit-Message als Changelog-Vorschau
          CHANGELOG=$(git log -1 --pretty=format:"%s")
          
          cat <<EOF > discord_msg.json
          {
            "embeds": [{
              "title": "💎 Emden Network Control Center — System-Update",
              "description": "Das Dashboard wurde erfolgreich aktualisiert und steht nun in der neuesten Version bereit! ✨🚀",
              "color": 53671,
              "fields": [
                {"name": "📦 Version", "value": "`${GITHUB_REF_NAME}`", "inline": true},
                {"name": "⚙️ Status", "value": "✅ Live & Stabil", "inline": true},
                {"name": "🛠️ Änderungen", "value": ">>> ${CHANGELOG}", "inline": false}
              ],
              "footer": {
                "text": "Automatisches Release-System — Emden Network 🧬",
                "icon_url": "https://cdn.discordapp.com/icons/1214227914041303100/a_66f07ead24647306236b3d16962f9011.gif"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          
          curl -X POST -H "Content-Type: application/json" -d @discord_msg.json https://discord.com/api/webhooks/1487189165278756924/aYRVcnsC8YTq49rjMzs4VocunHsGAvSei3-webqm81tdNlyTVkPzb1w3WZOYatW-Ni_V
