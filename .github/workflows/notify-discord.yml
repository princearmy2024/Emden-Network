name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Premium Dashboard Notification
        if: success()
        shell: bash
        run: |
          CHANGELOG=$(git log -1 --pretty=format:"%s")
          if [ -z "$CHANGELOG" ] || [ "$CHANGELOG" == "Build: Bump"* ]; then 
            CHANGELOG="System-Optimierungen und Stabilitätsverbesserungen."
          fi
          
          # Wir erstellen eine JSON-Datei für den Premium-Embed
          cat <<EOF > discord_msg.json
          {
            "embeds": [{
              "title": "Control Center — Update v${GITHUB_REF_NAME#v}",
              "description": "Das Dashboard wurde erfolgreich aktualisiert und steht nun in einer neuen Version zur Verfügung.",
              "color": 53671,
              "fields": [
                { "name": "📦 Version", "value": "`${GITHUB_REF_NAME}`", "inline": true },
                { "name": "✅ Status", "value": "Stabil", "inline": true },
                { "name": "🚀 Release", "value": "Produktion", "inline": true },
                { "name": "📋 Änderungen", "value": "```fix\n${CHANGELOG}\n```", "inline": false }
              ],
              "footer": {
                "text": "Emden Network | $(date +'%d.%m.%Y')"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }],
            "components": [{
              "type": 1,
              "components": [
                {
                  "type": 2,
                  "label": "💾 Jetzt Herunterladen (.exe)",
                  "style": 5,
                  "url": "https://github.com/princearmy2024/Emden-Network/releases/latest/download/EmdenNetworkSetup.exe"
                },
                {
                  "type": 2,
                  "label": "🧬 GitHub Repo",
                  "style": 5,
                  "url": "https://github.com/princearmy2024/Emden-Network"
                }
              ]
            }]
          }
          EOF
          
          curl -X POST -H "Content-Type: application/json" -d @discord_msg.json https://discord.com/api/webhooks/1487189165278756924/aYRVcnsC8YTq49rjMzs4VocunHsGAvSei3-webqm81tdNlyTVkPzb1w3WZOYatW-Ni_V
