name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Premium Discord Notification
        if: success()
        shell: bash
        run: |
          # Wir erstellen eine JSON-Datei für den Premium-Embed
          CHANGELOG=$(git log -1 --pretty=format:"%s")
          LOG_ICON="https://cdn.discordapp.com/icons/1214227914041303100/a_66f07ead24647306236b3d16962f9011.gif"
          
          # Wir nutzen eine Platzhalter-URL für das Bild, da das lokale Bild erst gehostet werden müsste.
          # Aber wir machen das Embed trotzdem 'and MORE' professionell!
          cat <<EOF > discord_msg.json
          {
            "username": "Nexus Updates 🚀",
            "avatar_url": "${LOG_ICON}",
            "embeds": [{
              "title": "💎 Emden Network | Control Center — v${GITHUB_REF_NAME}",
              "description": "Das Dashboard wurde erfolgreich auf die neueste Version aktualisiert! ✨\n\n> **Systemstatus**: Alle Systeme laufen im stabilen Bereich. ✅",
              "url": "https://github.com/princearmy2024/Emden-Network/releases/latest",
              "color": 53671,
              "thumbnail": { "url": "${LOG_ICON}" },
              "fields": [
                { "name": "📦 Version", "value": "`${GITHUB_REF_NAME}`", "inline": true },
                { "name": "⚙️ Release-Typ", "value": "🚀 Stabil", "inline": true },
                { "name": "🧬 Repository", "value": "[Emden-Network](https://github.com/princearmy2024/Emden-Network)", "inline": true },
                { "name": "🛠️ Was ist neu?", "value": "```fix\n${CHANGELOG}\n```", "inline": false }
              ],
              "footer": {
                "text": "Automatisches Release-System — Emden Network 🧬 | $(date +'%d.%m.%Y')",
                "icon_url": "${LOG_ICON}"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          
          curl -X POST -H "Content-Type: application/json" -d @discord_msg.json https://discord.com/api/webhooks/1487189165278756924/aYRVcnsC8YTq49rjMzs4VocunHsGAvSei3-webqm81tdNlyTVkPzb1w3WZOYatW-Ni_V
