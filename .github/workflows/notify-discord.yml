name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Professional Discord Notification
        if: success()
        shell: bash
        run: |
          CHANGELOG=$(git log -1 --pretty=format:"%s")
          if [ -z "$CHANGELOG" ]; then CHANGELOG="Wartungsarbeiten und Systemstabilität."; fi
          
          cat <<EOF > discord_msg.json
          {
            "embeds": [{
              "title": "Control Center Update — ${GITHUB_REF_NAME}",
              "description": "Das Dashboard wurde erfolgreich auf die neueste Version aktualisiert.",
              "color": 53671,
              "fields": [
                { "name": "Version", "value": "`${GITHUB_REF_NAME}`", "inline": true },
                { "name": "Status", "value": "Stabil", "inline": true },
                { "name": "Changelog", "value": "```fix\n${CHANGELOG}\n```", "inline": false }
              ],
              "footer": {
                "text": "Emden Network | $(date +'%d.%m.%Y')"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }],
            "components": [{
              "type": 1,
              "components": [{
                "type": 2,
                "label": "Direkt-Download",
                "style": 5,
                "url": "https://github.com/princearmy2024/Emden-Network/releases/latest/download/EmdenNetworkSetup.exe"
              }]
            }]
          }
          EOF
          
          curl -X POST -H "Content-Type: application/json" -d @discord_msg.json https://discord.com/api/webhooks/1487189165278756924/aYRVcnsC8YTq49rjMzs4VocunHsGAvSei3-webqm81tdNlyTVkPzb1w3WZOYatW-Ni_V
