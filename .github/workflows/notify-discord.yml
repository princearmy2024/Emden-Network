name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Premium Discord Notification
        if: success()
        shell: bash
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"embeds\": [{
            \"title\": \"🚀 Neues Emden Network Update!\",
            \"description\": \"Ein neues Control Center-Update wurde erfolgreich veröffentlicht! ✨🚀\",
            \"color\": 3447003,
            \"fields\": [
              {\"name\": \"📦 Version\", \"value\": \"\`${GITHUB_REF_NAME}\`\", \"inline\": true},
              {\"name\": \"🌐 Repository\", \"value\": \"Emden-Network\", \"inline\": true},
              {\"name\": \"📦 Download\", \"value\": \"[Dashboard herunterladen](https://github.com/princearmy2024/Emden-Network/releases/latest/download/EmdenNetworkSetup.exe)\"}
            ],
            \"footer\": {\"text\": \"Automatisches System by Antigravity 🤖\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]}" \
          https://discord.com/api/webhooks/1487189165278756924/aYRVcnsC8YTq49rjMzs4VocunHsGAvSei3-webqm81tdNlyTVkPzb1w3WZOYatW-Ni_V
