name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mobile Dependencies
        working-directory: mobile
        run: npm install

      - name: Capacitor Sync
        working-directory: mobile
        run: npx cap sync android

      - name: Build Android APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
        continue-on-error: true

      - name: Build Debug APK as fallback
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
        continue-on-error: true

      - name: Rename APK
        run: |
          mkdir -p apk-out
          cp mobile/android/app/build/outputs/apk/release/app-release.apk apk-out/Emden-Network-Mobile.apk 2>/dev/null || \
          cp mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk apk-out/Emden-Network-Mobile.apk 2>/dev/null || \
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk apk-out/Emden-Network-Mobile.apk 2>/dev/null || \
          echo "No APK found"
          ls -la apk-out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-android
          path: apk-out/*.apk
        continue-on-error: true

  release:
    needs: [build, build-android]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: build-win
          path: dist/
        continue-on-error: true

      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: build-mac
          path: dist/
        continue-on-error: true

      - name: Download Android build
        uses: actions/download-artifact@v4
        with:
          name: build-android
          path: dist/
        continue-on-error: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.apk
