<!DOCTYPE html>
<html><head><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100%;height:100%}
.btn{
    width:46px;height:46px;border-radius:14px;
    background:rgba(10,10,22,0.88);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,0.1);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 12px rgba(59,130,246,0.08);
    cursor:pointer;transition:all 0.2s;
    -webkit-app-region:drag;
}
.btn:hover{border-color:rgba(59,130,246,0.35);box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 20px rgba(59,130,246,0.15)}
</style></head>
<body>
<div class="btn" id="modBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
</div>
<script>
// Klick (nicht drag) erkennen
let moved = false, sx, sy;
const btn = document.getElementById('modBtn');
btn.addEventListener('mousedown', (e) => { moved = false; sx = e.screenX; sy = e.screenY; });
btn.addEventListener('mouseup', (e) => {
    if (Math.abs(e.screenX - sx) < 5 && Math.abs(e.screenY - sy) < 5) {
        // Klick! Panel öffnen via IPC
        if (window.electronAPI?.toggleModPanel) window.electronAPI.toggleModPanel();
    }
});
</script>
</body></html>
