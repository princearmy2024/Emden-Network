<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Emden Network Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw; height: 100vh;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  user-select: none;
  -webkit-app-region: no-drag;
  -webkit-font-smoothing: antialiased;
}

:root {
  --glass-bg: rgba(12, 12, 26, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent-blue: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.35);
  --text-main: #ffffff;
  --text-muted: rgba(255, 255, 255, 0.45);
  --font-mono: 'JetBrains Mono', 'Roboto Mono', monospace;
  --panel-base: #0a0a14;
}

/* ================================================================
   LEFT PANEL — starts at 40% from top (top-left FREE for chat)
   Gradient: solid -> transparent nach rechts
   ================================================================ */
#panel-left {
  position: fixed;
  top: 40vh;
  left: 0;
  width: clamp(180px, 14vw, 240px);
  bottom: clamp(40px, 5vh, 60px);
  background: linear-gradient(to right,
    rgba(10, 10, 20, 0.88) 0%,
    rgba(10, 10, 20, 0.65) 35%,
    rgba(10, 10, 20, 0.25) 65%,
    transparent 100%
  );
  z-index: 50;
  display: flex; flex-direction: column;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

/* BOTTOM BAR — flush to bottom, no gap */
#panel-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: clamp(40px, 5vh, 60px);
  background: linear-gradient(to top,
    rgba(10, 10, 20, 0.85) 0%,
    rgba(10, 10, 20, 0.45) 45%,
    transparent 100%
  );
  z-index: 50;
  display: flex; align-items: flex-end;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

/* RIGHT BOTTOM — only bottom 40% (top-right FREE for map) */
#panel-right {
  position: fixed;
  top: 60vh;
  right: 0;
  width: clamp(160px, 12vw, 220px);
  bottom: clamp(40px, 5vh, 60px);
  background: linear-gradient(to left,
    rgba(10, 10, 20, 0.82) 0%,
    rgba(10, 10, 20, 0.5) 35%,
    rgba(10, 10, 20, 0.15) 65%,
    transparent 100%
  );
  z-index: 50;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ================================================================
   GLOW ACCENT LINES — subtle blue edges
   ================================================================ */
.glow-line-left {
  position: fixed;
  top: 42vh;
  left: clamp(179px, calc(14vw - 1px), 239px);
  bottom: clamp(42px, calc(5vh + 2px), 62px);
  width: 1px;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(59, 130, 246, 0.08) 20%,
    rgba(59, 130, 246, 0.14) 50%,
    rgba(59, 130, 246, 0.08) 80%,
    transparent 100%
  );
  z-index: 52; pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease;
}

.glow-line-bottom {
  position: fixed;
  bottom: clamp(39px, calc(5vh - 1px), 59px);
  left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(to right,
    transparent 0%,
    rgba(59, 130, 246, 0.08) 20%,
    rgba(59, 130, 246, 0.12) 50%,
    rgba(59, 130, 246, 0.08) 80%,
    transparent 100%
  );
  z-index: 52; pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease;
}

/* ================================================================
   REFLECTION / SHIMMER ANIMATION on panels
   ================================================================ */
#panel-left::after,
#panel-right::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0; bottom: 0;
  width: 300%;
  background: linear-gradient(
    105deg,
    transparent 0%,
    transparent 40%,
    rgba(59, 130, 246, 0.04) 42%,
    rgba(255, 255, 255, 0.06) 44%,
    rgba(59, 130, 246, 0.04) 46%,
    transparent 48%,
    transparent 100%
  );
  animation: panel-shimmer 12s ease-in-out infinite;
  pointer-events: none;
}

#panel-right::after {
  animation-delay: 6s;
}

@keyframes panel-shimmer {
  0% { transform: translateX(-30%); }
  30% { transform: translateX(130%); }
  100% { transform: translateX(130%); }
}

#panel-bottom::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0; bottom: 0;
  width: 300%; height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    transparent 40%,
    rgba(59, 130, 246, 0.03) 44%,
    rgba(255, 255, 255, 0.04) 46%,
    rgba(59, 130, 246, 0.03) 48%,
    transparent 50%,
    transparent 100%
  );
  animation: bar-shimmer 15s ease-in-out infinite;
  animation-delay: 3s;
  pointer-events: none;
}

@keyframes bar-shimmer {
  0% { transform: translateX(-20%); }
  25% { transform: translateX(120%); }
  100% { transform: translateX(120%); }
}

/* ================================================================
   LEFT PANEL CONTENT
   ================================================================ */
.panel-section {
  padding: 8px clamp(10px, 1vw, 16px);
}
.panel-section-title {
  font-size: clamp(8px, 0.55vw, 10px);
  font-weight: 700;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 6px;
  padding-left: 4px;
}

.panel-info-card {
  display: flex; align-items: center; gap: clamp(6px, 0.5vw, 10px);
  padding: clamp(5px, 0.4vw, 8px) clamp(6px, 0.5vw, 10px);
  border-radius: 8px;
  margin-bottom: 2px;
  transition: background 0.2s;
  pointer-events: auto; cursor: default;
}
.panel-info-card:hover { background: rgba(255, 255, 255, 0.04); }

.panel-info-icon {
  width: clamp(24px, 1.6vw, 30px);
  height: clamp(24px, 1.6vw, 30px);
  border-radius: 7px;
  background: rgba(59, 130, 246, 0.1);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-blue); flex-shrink: 0;
}
.panel-info-icon svg { width: clamp(11px, 0.75vw, 14px); height: clamp(11px, 0.75vw, 14px); }
.panel-info-icon.green { background: rgba(16, 185, 129, 0.1); color: #10b981; }
.panel-info-icon.orange { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

.panel-info-label {
  font-size: clamp(7px, 0.5vw, 9px);
  color: rgba(255,255,255,0.3);
  text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
}
.panel-info-value {
  font-size: clamp(11px, 0.75vw, 14px);
  color: #fff; font-weight: 700;
}
.panel-info-value.accent { color: var(--accent-blue); }

.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #10b981;
  margin-left: auto; flex-shrink: 0;
  box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
  animation: pulse-green 2.5s infinite;
}
@keyframes pulse-green {
  0% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}

.panel-sep {
  height: 1px; margin: 6px clamp(12px, 1vw, 18px);
  background: linear-gradient(to right, rgba(255,255,255,0.06), transparent);
}

.panel-spacer { flex: 1; }

/* ================================================================
   BOTTOM BAR CONTENT
   ================================================================ */
.bottom-bar-content {
  display: flex; align-items: center; gap: clamp(8px, 0.8vw, 14px);
  padding: clamp(6px, 0.6vh, 12px) clamp(14px, 1.2vw, 24px);
  width: 100%;
}

.bottom-hint {
  font-size: clamp(8px, 0.55vw, 11px);
  color: rgba(255,255,255,0.18);
  font-weight: 600;
  display: flex; align-items: center; gap: clamp(5px, 0.5vw, 10px);
}
.bottom-hint kbd {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 1px 5px; border-radius: 3px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: clamp(7px, 0.45vw, 9px);
  font-weight: 700; color: rgba(255,255,255,0.3);
  font-family: var(--font-mono);
}

.bottom-version {
  font-size: clamp(8px, 0.5vw, 10px);
  color: rgba(255,255,255,0.1);
  font-weight: 600;
  margin-left: auto;
  letter-spacing: 0.03em;
}

/* ================================================================
   LOGO — Bottom Right with Reflection Blitz
   ================================================================ */
#logo-container {
  position: fixed;
  bottom: clamp(48px, calc(5vh + 10px), 72px);
  right: clamp(12px, 1.2vw, 24px);
  z-index: 55;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease;
}

#logo-img {
  width: clamp(48px, 4vw, 72px);
  height: clamp(48px, 4vw, 72px);
  object-fit: contain;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  opacity: 0.7;
  transition: opacity 0.3s;
}

/* Reflection overlay on logo */
#logo-container::after {
  content: '';
  position: absolute;
  top: 0; left: -50%;
  width: 200%; height: 100%;
  background: linear-gradient(
    115deg,
    transparent 0%,
    transparent 35%,
    rgba(59, 130, 246, 0.15) 40%,
    rgba(255, 255, 255, 0.35) 43%,
    rgba(59, 130, 246, 0.15) 46%,
    transparent 50%,
    transparent 100%
  );
  opacity: 0;
  pointer-events: none;
  animation: logo-blitz 30s ease-in-out infinite;
}

@keyframes logo-blitz {
  0% { opacity: 0; transform: translateX(-80%) rotate(0deg); }
  2% { opacity: 1; }
  5% { opacity: 1; transform: translateX(120%) rotate(0deg); }
  6% { opacity: 0; transform: translateX(120%); }
  100% { opacity: 0; transform: translateX(-80%); }
}

/* ================================================================
   NOTIFICATIONS — bottom-left inside panel area
   ================================================================ */
#notif-area {
  padding: 0 clamp(8px, 0.7vw, 14px);
  display: flex; flex-direction: column-reverse; gap: 6px;
  max-height: 30vh;
  overflow: hidden;
  pointer-events: none;
}
.notif-card {
  background: rgba(10, 10, 22, 0.9);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 10px; padding: 8px 10px;
  display: flex; gap: 8px; align-items: flex-start;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  animation: notifIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  pointer-events: auto;
}
.notif-card.out { animation: notifOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.notif-card.ticket   { border-left: 2px solid var(--accent-blue); }
.notif-card.announce { border-left: 2px solid #60a5fa; }
.notif-card.admin    { border-left: 2px solid #f59e0b; }

.notif-ico { color: var(--accent-blue); flex-shrink: 0; margin-top: 1px; }
.notif-ico svg { width: 12px; height: 12px; }
.notif-title { font-size: clamp(9px, 0.6vw, 11px); font-weight: 800; color: #fff; margin-bottom: 1px; }
.notif-text { font-size: clamp(8px, 0.55vw, 10px); color: rgba(255,255,255,0.45); line-height: 1.35; }
.notif-time { font-size: clamp(7px, 0.45vw, 9px); color: rgba(255,255,255,0.15); margin-top: 3px; font-weight: 500; }

@keyframes notifIn {
  from { opacity: 0; transform: translateX(-16px) scale(0.95); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes notifOut {
  from { opacity: 1; transform: translateX(0) scale(1); max-height: 100px; }
  to { opacity: 0; transform: translateX(-12px) scale(0.9); max-height: 0; padding: 0; margin: 0; }
}

/* ================================================================
   BIG ANNOUNCEMENT (center)
   ================================================================ */
#big-ann {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 200;
  background: radial-gradient(circle at center, rgba(59, 130, 246, 0.03) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.6s ease;
}
#big-ann.visible { opacity: 1; }
.big-ann-card {
  background: rgba(8, 8, 18, 0.92);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(59, 130, 246, 0.25);
  border-radius: 24px; padding: 40px 56px; text-align: center;
  max-width: clamp(400px, 30vw, 520px);
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 80px rgba(59, 130, 246, 0.08);
  transform: scale(0.85);
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
#big-ann.visible .big-ann-card { transform: scale(1); }
.big-ann-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--accent-blue); background: rgba(59, 130, 246, 0.1);
  border: 1px solid rgba(59, 130, 246, 0.25); border-radius: 100px; padding: 6px 14px; margin-bottom: 20px;
}
.big-ann-title { font-size: clamp(22px, 2vw, 32px); font-weight: 900; color: #fff; margin-bottom: 10px; }
.big-ann-text  { font-size: clamp(12px, 0.9vw, 15px); color: rgba(255,255,255,0.6); line-height: 1.7; font-weight: 500; }

/* ================================================================
   F3 COMMAND BAR
   ================================================================ */
#cmd-bar {
  position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
  width: clamp(420px, 35vw, 600px); z-index: 300;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
#cmd-bar.visible { top: 60px; }
.cmd-inner {
  background: rgba(10, 10, 22, 0.95);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px; padding: 12px 18px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.8);
}
#cmd-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: clamp(13px, 0.9vw, 16px); color: #fff; font-family: inherit; font-weight: 600;
  caret-color: var(--accent-blue);
}
.cmd-ico { color: var(--accent-blue); opacity: 0.9; display: flex; align-items: center; }
.cmd-ico svg { width: 18px; height: 18px; }
.cmd-badge {
  font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--accent-blue); background: rgba(59, 130, 246, 0.1);
  border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 6px; padding: 4px 10px;
}
.cmd-esc {
  font-size: 10px; color: rgba(255,255,255,0.3); font-weight: 700;
  padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer; transition: all 0.2s;
}
.cmd-esc:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

/* ================================================================
   MOD PANEL
   ================================================================ */
#mod-panel {
  position: fixed; top: 80px; left: 40px;
  width: 320px; height: 480px; max-height: calc(100vh - 120px);
  background: rgba(10, 10, 22, 0.92);
  backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  z-index: 250; display: none; flex-direction: column;
  overflow: hidden; resize: both;
}
#mod-panel.visible { display: flex; pointer-events: auto; }
.mod-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; cursor: grab;
}
.mod-header:active { cursor: grabbing; }
.mod-title { font-size: 13px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
.mod-title svg { color: var(--accent-blue); }
.mod-close {
  width: 26px; height: 26px; border-radius: 8px; border: none;
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; transition: all 0.2s;
}
.mod-close:hover { background: rgba(255,107,107,0.15); color: #ff6b6b; }
.mod-search { padding: 10px 14px; flex-shrink: 0; }
.mod-search-input {
  width: 100%; padding: 9px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06);
  color: #fff; font-size: 12px; font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.mod-search-input:focus { border-color: var(--accent-blue); }
.mod-search-input::placeholder { color: rgba(255,255,255,0.25); }
.mod-results { flex: 1; overflow-y: auto; padding: 0 10px; scrollbar-width: none; }
.mod-results::-webkit-scrollbar { display: none; }
.mod-user-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  transition: background 0.2s; border: 1px solid transparent;
}
.mod-user-item:hover { background: rgba(255,255,255,0.04); }
.mod-user-item.selected { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
.mod-user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-blue), #1e40af);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  overflow: hidden; flex-shrink: 0;
}
.mod-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.mod-user-name { font-size: 12px; font-weight: 600; color: #fff; }
.mod-user-id { font-size: 9px; color: rgba(255,255,255,0.3); font-family: var(--font-mono); }
.mod-actions {
  padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
}
.mod-selected-user {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: rgba(59,130,246,0.08);
  border-radius: 6px; margin-bottom: 8px; font-size: 11px; color: var(--accent-blue); font-weight: 600;
}
.mod-selected-user.hidden { display: none; }
.mod-reason-input {
  width: 100%; padding: 8px 10px; border-radius: 6px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  color: #fff; font-size: 11px; font-family: inherit; outline: none;
  margin-bottom: 8px;
}
.mod-reason-input:focus { border-color: var(--accent-blue); }
.mod-reason-input::placeholder { color: rgba(255,255,255,0.2); }
.mod-btns { display: flex; gap: 5px; }
.mod-btn {
  flex: 1; padding: 8px 0; border: none; border-radius: 6px;
  font-size: 10px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
}
.mod-btn.kick { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
.mod-btn.kick:hover { background: rgba(245,158,11,0.25); }
.mod-btn.ban { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
.mod-btn.ban:hover { background: rgba(239,68,68,0.25); }
.mod-btn.warn { background: rgba(59,130,246,0.15); color: var(--accent-blue); border: 1px solid rgba(59,130,246,0.2); }
.mod-btn.warn:hover { background: rgba(59,130,246,0.25); }
.mod-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.mod-status {
  padding: 6px 14px; text-align: center; font-size: 10px;
  color: #10b981; font-weight: 600; display: none;
}
.mod-status.show { display: block; animation: statusFade 2s ease-out forwards; }
@keyframes statusFade { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }

/* MOD TOGGLE + HINT */
#mod-toggle {
  position: fixed; top: 22px; left: 22px;
  width: 42px; height: 42px; border-radius: 12px;
  background: rgba(10,10,22,0.88); backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.1);
  display: none; align-items: center; justify-content: center;
  cursor: grab; color: var(--accent-blue); z-index: 260;
  box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  transition: background 0.3s, border-color 0.3s;
}
#mod-toggle:hover { background: rgba(15,15,32,0.95); border-color: rgba(59,130,246,0.35); }
#mod-toggle.visible { display: flex; pointer-events: auto; }
#mod-toggle svg { width: 18px; height: 18px; pointer-events: none; }

#mod-hint {
  position: fixed; top: 22px; left: 22px;
  display: none; align-items: center; gap: 6px; padding: 6px 12px;
  background: rgba(10,10,22,0.85); backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  z-index: 100; pointer-events: none;
}

/* ================================================================
   VOICE STATUS — bottom-right above logo
   ================================================================ */
#voice-status-area {
  position: fixed;
  bottom: clamp(100px, calc(5vh + 70px), 140px);
  right: clamp(12px, 1.2vw, 24px);
  z-index: 100; opacity: 0; transform: translateX(20px) scale(0.95);
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
#voice-status-area.visible { opacity: 1; transform: translateX(0) scale(1); }
.voice-status-card {
  background: rgba(14, 14, 24, 0.9);
  backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.08);
  border-left: 3px solid var(--accent-blue);
  border-radius: 10px; padding: 10px 14px 10px 10px;
  display: flex; align-items: center; gap: 12px;
}
.voice-avatar {
  width: 36px; height: 36px; border-radius: 50%; position: relative;
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  border: 2px solid transparent;
}
.voice-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.voice-avatar .voice-icon {
  position: absolute; bottom: -3px; right: -3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #12121b; display: flex; align-items: center; justify-content: center; color: #fff;
}
.voice-avatar .voice-icon svg { width: 9px; height: 9px; }
.voice-user { font-size: 13px; font-weight: 800; color: #fff; }
.voice-channel { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 1px; letter-spacing: 0.05em; }

@keyframes speak-ring-pulse {
  0% { box-shadow: 0 0 0 0px var(--ring-color); transform: scale(1); }
  50% { box-shadow: 0 0 0 4px rgba(0,0,0,0); transform: scale(1.05); }
  100% { box-shadow: 0 0 0 0px rgba(0,0,0,0); transform: scale(1); }
}

/* ================================================================
   VISIBILITY — show when overlay active
   ================================================================ */
body.overlay-active #panel-left,
body.overlay-active #panel-bottom,
body.overlay-active #panel-right,
body.overlay-active .glow-line-left,
body.overlay-active .glow-line-bottom,
body.overlay-active #logo-container {
  opacity: 1;
}

/* Hidden info-bar for backward compat */
#info-bar { display: none; }
</style>
</head>
<body>

<!-- ========== GRADIENT FRAME PANELS ========== -->

<!-- LEFT PANEL (starts at 40vh — top-left is FREE) -->
<div id="panel-left">
  <div class="panel-section">
    <div class="panel-section-title">Status</div>
    <div class="panel-info-card">
      <div class="panel-info-icon green"><i data-lucide="shield-check"></i></div>
      <div>
        <div class="panel-info-label">On Duty</div>
        <div class="panel-info-value accent" id="supporter-count">0 Supporter</div>
      </div>
      <span class="live-dot"></span>
    </div>
    <div class="panel-info-card">
      <div class="panel-info-icon"><i data-lucide="timer"></i></div>
      <div>
        <div class="panel-info-label">Spielzeit</div>
        <div class="panel-info-value" id="playtime">00:00:00</div>
      </div>
    </div>
    <div class="panel-info-card">
      <div class="panel-info-icon orange"><i data-lucide="clock"></i></div>
      <div>
        <div class="panel-info-label">Uhrzeit</div>
        <div class="panel-info-value" id="clock">--:--</div>
      </div>
    </div>
  </div>

  <div class="panel-sep"></div>

  <div class="panel-section">
    <div class="panel-section-title">Shortcuts</div>
    <div class="panel-info-card" style="opacity:0.45;">
      <div class="panel-info-icon"><i data-lucide="terminal"></i></div>
      <div>
        <div class="panel-info-label">Commands</div>
        <div class="panel-info-value" style="font-size:11px;">F3</div>
      </div>
    </div>
    <div class="panel-info-card" style="opacity:0.45;">
      <div class="panel-info-icon"><i data-lucide="shield"></i></div>
      <div>
        <div class="panel-info-label">Mod Panel</div>
        <div class="panel-info-value" style="font-size:11px;">F4</div>
      </div>
    </div>
    <div class="panel-info-card" style="opacity:0.45;">
      <div class="panel-info-icon"><i data-lucide="mic"></i></div>
      <div>
        <div class="panel-info-label">Push to Talk</div>
        <div class="panel-info-value" style="font-size:11px;">V</div>
      </div>
    </div>
  </div>

  <div class="panel-spacer"></div>

  <!-- Notifications -->
  <div id="notif-area"></div>
</div>

<!-- BOTTOM BAR (flush, kein Abstand) -->
<div id="panel-bottom">
  <div class="bottom-bar-content">
    <div class="bottom-hint">
      <kbd>F2</kbd> Dashboard
      <kbd>F3</kbd> Commands
      <kbd>F4</kbd> Mod
      <kbd>V</kbd> Talk
    </div>
    <div class="bottom-version">Emden Network v4.25.2</div>
  </div>
</div>

<!-- RIGHT PANEL (only bottom 40% — top-right FREE for map) -->
<div id="panel-right"></div>

<!-- GLOW LINES -->
<div class="glow-line-left"></div>
<div class="glow-line-bottom"></div>

<!-- LOGO — bottom right with reflection blitz -->
<div id="logo-container">
  <img id="logo-img" src="assets/logoEN.png" alt="EN" />
</div>

<!-- Hidden info-bar for renderer.js compat -->
<div id="info-bar"></div>

<!-- BIG ANNOUNCEMENT -->
<div id="big-ann">
  <div class="big-ann-card">
    <div class="big-ann-badge"><i data-lucide="megaphone"></i> <span>Announcement</span></div>
    <div class="big-ann-title" id="big-ann-title"></div>
    <div class="big-ann-text"  id="big-ann-text"></div>
  </div>
</div>

<!-- F3 COMMAND BAR -->
<div id="cmd-bar">
  <div class="cmd-inner">
    <span class="cmd-ico"><i data-lucide="terminal"></i></span>
    <input id="cmd-input" type="text" placeholder="Command eingeben...  /kick  /tp  /announce" autocomplete="off" spellcheck="false" />
    <span class="cmd-badge">Admin F3</span>
    <span class="cmd-esc" onclick="Overlay.toggleCmd()">ESC</span>
  </div>
</div>

<!-- MOD HINT -->
<div id="mod-hint">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  <span style="font-size:9px;color:rgba(255,255,255,0.5);font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em;">F4 MOD</span>
</div>

<!-- MOD PANEL -->
<div id="mod-panel">
  <div class="mod-header">
    <div class="mod-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Moderation
    </div>
    <button class="mod-close" onclick="Overlay.toggleModPanel()">&times;</button>
  </div>
  <div class="mod-search">
    <input type="text" class="mod-search-input" id="modSearchInput" placeholder="Roblox Username suchen..." oninput="Overlay.searchModUser(this.value)">
  </div>
  <div class="mod-results" id="modResults">
    <div style="text-align:center;padding:30px 16px;color:rgba(255,255,255,0.2);font-size:11px;">Username eingeben zum Suchen</div>
  </div>
  <div class="mod-actions">
    <div class="mod-selected-user hidden" id="modSelectedUser">Kein User ausgewahlt</div>
    <input type="text" class="mod-reason-input" id="modReasonInput" placeholder="Grund eingeben...">
    <div class="mod-btns">
      <button class="mod-btn warn" onclick="Overlay.modAction('Warn')" disabled id="modBtnWarn">Warn</button>
      <button class="mod-btn kick" onclick="Overlay.modAction('Kick')" disabled id="modBtnKick">Kick</button>
      <button class="mod-btn ban" onclick="Overlay.modAction('Ban')" disabled id="modBtnBan">Ban</button>
    </div>
    <div class="mod-status" id="modStatus"></div>
  </div>
</div>

<!-- VOICE STATUS -->
<div id="voice-status-area">
  <div class="voice-status-card">
    <div class="voice-avatar" id="voice-avatar-container">
      <div class="voice-icon"><i data-lucide="mic"></i></div>
    </div>
    <div class="voice-info">
      <div class="voice-channel" id="voice-channel-name">FUNK</div>
      <div class="voice-user" id="voice-username">USER</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="roblox-overlay-renderer.js"></script>
</body>
</html>
