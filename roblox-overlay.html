<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Emden Network Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100vw; height: 100vh;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  user-select: none;
  -webkit-app-region: no-drag;
  -webkit-font-smoothing: antialiased;
}

:root {
  --glass-bg: rgba(12, 12, 26, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent-blue: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.35);
  --text-main: #ffffff;
  --text-muted: rgba(255, 255, 255, 0.45);
  --font-mono: 'JetBrains Mono', 'Roboto Mono', monospace;
}

/* ── INFO BAR (top-left) ── */
#info-bar {
  position: fixed; top: 22px; left: 420px;
  display: flex; flex-direction: row; gap: 10px;
  z-index: 100;
  opacity: 0; transform: translateY(-30px);
  transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}
#info-bar.visible { opacity: 1; transform: translateY(0); }

.info-card {
  background: var(--glass-bg);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 12px; padding: 7px 14px;
  display: flex; align-items: center; gap: 10px; min-width: 130px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.03);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}
.info-card:hover {
  transform: translateY(-3px);
  background: rgba(15, 15, 32, 0.75);
  border-color: rgba(255,255,255,0.15);
  box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 20px rgba(59, 130, 246, 0.1);
}

.info-icon {
  width: 26px; height: 26px; border-radius: 8px;
  background: rgba(59, 130, 246, 0.12);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-blue);
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(59, 130, 246, 0.05);
}
.info-icon svg { width: 14px; height: 14px; filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.4)); }

.info-label { 
  font-size: 8px; color: var(--text-muted); 
  text-transform: uppercase; letter-spacing: 0.1em; 
  font-weight: 700; margin-bottom: 0px;
}
.info-value { 
  font-size: 13px; color: var(--text-main); 
  font-weight: 800; letter-spacing: -0.01em;
}
.info-value.blue { color: var(--accent-blue); }

.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #10b981;
  margin-left: 8px; flex-shrink: 0;
  box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
  animation: pulse-green 2.5s infinite;
}
@keyframes pulse-green { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

/* ── NOTIFICATION AREA (bottom-left) ── */
#notif-area {
  position: fixed; bottom: 32px; left: 32px;
  display: flex; flex-direction: column-reverse; gap: 10px;
  z-index: 100; max-width: 340px;
}
.notif-card {
  background: rgba(10, 10, 22, 0.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 16px; padding: 14px 18px;
  display: flex; gap: 14px; align-items: flex-start;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transform-origin: left center;
  animation: notifIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.notif-card.out { animation: notifOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

.notif-card.ticket   { border-left: 3px solid var(--accent-blue); }
.notif-card.announce { border-left: 3px solid #60a5fa; }
.notif-card.admin    { border-left: 3px solid #f59e0b; }

.notif-ico { color: var(--accent-blue); flex-shrink: 0; margin-top: 2px; }
.notif-ico svg { width: 20px; height: 20px; }

.notif-title { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 3px; }
.notif-text { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.5; }
.notif-time { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 6px; font-weight: 500; }

@keyframes notifIn { 
    from { opacity: 0; transform: translateX(-30px) scale(0.95); filter: blur(4px); } 
    to { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); } 
}
@keyframes notifOut { 
    from { opacity: 1; transform: translateX(0) scale(1); max-height: 150px; } 
    to { opacity: 0; transform: translateX(-20px) scale(0.9); max-height: 0; padding: 0; margin: 0; } 
}

/* ── BIG ANNOUNCEMENT (center) ── */
#big-ann {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 200;
  background: radial-gradient(circle at center, rgba(59, 130, 246, 0.03) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.6s ease;
}
#big-ann.visible { opacity: 1; }

.big-ann-card {
  background: rgba(8, 8, 18, 0.92);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(59, 130, 246, 0.25);
  border-radius: 32px; padding: 50px 70px; text-align: center; max-width: 600px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 100px rgba(59, 130, 246, 0.1);
  transform: scale(0.85);
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
#big-ann.visible .big-ann-card { transform: scale(1); }

.big-ann-badge {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--accent-blue); background: rgba(59, 130, 246, 0.1);
  border: 1px solid rgba(59, 130, 246, 0.25); border-radius: 100px; padding: 7px 18px; margin-bottom: 24px;
}
.big-ann-title { font-size: 36px; font-weight: 900; color: #fff; margin-bottom: 14px; letter-spacing: -0.02em; }
.big-ann-text  { font-size: 16px; color: rgba(255,255,255,0.65); line-height: 1.7; font-weight: 500; }

/* ── F3 COMMAND BAR ── */
#cmd-bar {
  position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
  width: 640px; z-index: 300;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
#cmd-bar.visible { top: 32px; }

.cmd-inner {
  background: rgba(10, 10, 22, 0.95);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px; padding: 16px 24px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
}
#cmd-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 17px; color: #fff; font-family: inherit; font-weight: 600;
  caret-color: var(--accent-blue);
}
.cmd-ico { color: var(--accent-blue); opacity: 0.9; display: flex; align-items: center; }
.cmd-ico svg { width: 22px; height: 22px; }
.cmd-badge {
  font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--accent-blue); background: rgba(59, 130, 246, 0.1);
  border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 8px; padding: 5px 12px;
}
.cmd-esc {
  font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 700;
  padding: 5px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.2s;
}
.cmd-esc:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

/* ── MOD PANEL (left side) ── */
#mod-panel {
  position: fixed; top: 80px; left: 40px;
  width: 340px; height: 500px; max-height: calc(100vh - 120px);
  background: rgba(10, 10, 22, 0.92);
  backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  z-index: 250; display: none; flex-direction: column;
  overflow: hidden; resize: both;
}
#mod-panel.visible { display: flex; }

.mod-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; cursor: grab;
}
.mod-header:active { cursor: grabbing; }
.mod-title { font-size: 14px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
.mod-title svg { color: var(--accent-blue); }
.mod-close {
  width: 28px; height: 28px; border-radius: 8px; border: none;
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: all 0.2s;
}
.mod-close:hover { background: rgba(255,107,107,0.15); color: #ff6b6b; }

.mod-search {
  padding: 12px 16px; flex-shrink: 0;
}
.mod-search-input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06);
  color: #fff; font-size: 13px; font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.mod-search-input:focus { border-color: var(--accent-blue); }
.mod-search-input::placeholder { color: rgba(255,255,255,0.25); }

.mod-results {
  flex: 1; overflow-y: auto; padding: 0 12px;
  scrollbar-width: none;
}
.mod-results::-webkit-scrollbar { display: none; }

.mod-user-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  transition: background 0.2s; border: 1px solid transparent;
}
.mod-user-item:hover { background: rgba(255,255,255,0.04); }
.mod-user-item.selected { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
.mod-user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-blue), #1e40af);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  overflow: hidden; flex-shrink: 0;
}
.mod-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.mod-user-name { font-size: 13px; font-weight: 600; color: #fff; }
.mod-user-id { font-size: 10px; color: rgba(255,255,255,0.3); font-family: var(--font-mono); }

/* Mod Action Area */
.mod-actions {
  padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.mod-selected-user {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: rgba(59,130,246,0.08);
  border-radius: 8px; margin-bottom: 10px; font-size: 12px; color: var(--accent-blue); font-weight: 600;
}
.mod-selected-user.hidden { display: none; }

.mod-reason-input {
  width: 100%; padding: 9px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  color: #fff; font-size: 12px; font-family: inherit; outline: none;
  margin-bottom: 10px; transition: border-color 0.2s;
}
.mod-reason-input:focus { border-color: var(--accent-blue); }
.mod-reason-input::placeholder { color: rgba(255,255,255,0.2); }

.mod-btns { display: flex; gap: 6px; }
.mod-btn {
  flex: 1; padding: 9px 0; border: none; border-radius: 8px;
  font-size: 11px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
}
.mod-btn.kick { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
.mod-btn.kick:hover { background: rgba(245,158,11,0.25); }
.mod-btn.ban { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
.mod-btn.ban:hover { background: rgba(239,68,68,0.25); }
.mod-btn.warn { background: rgba(59,130,246,0.15); color: var(--accent-blue); border: 1px solid rgba(59,130,246,0.2); }
.mod-btn.warn:hover { background: rgba(59,130,246,0.25); }
.mod-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Mod Toggle Button */
#mod-toggle {
  position: fixed; top: 22px; left: 22px;
  width: 46px; height: 46px; border-radius: 14px;
  background: rgba(10,10,22,0.88); backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.1);
  display: none; align-items: center; justify-content: center;
  cursor: grab; color: var(--accent-blue); z-index: 260;
  box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 12px rgba(59,130,246,0.08);
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}
#mod-toggle:hover { background: rgba(15,15,32,0.95); border-color: rgba(59,130,246,0.35); box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 20px rgba(59,130,246,0.15); }
#mod-toggle:active { cursor: grabbing; }
#mod-toggle.visible { display: flex; }
#mod-toggle svg { width: 20px; height: 20px; pointer-events: none; }

.mod-status {
  padding: 8px 16px; text-align: center; font-size: 11px;
  color: #10b981; font-weight: 600; display: none;
}
.mod-status.show { display: block; animation: statusFade 2s ease-out forwards; }
@keyframes statusFade { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }

/* ── VOICE STATUS AREA (bottom-right) ── */
#voice-status-area {
  position: fixed; bottom: 32px; right: 32px;
  z-index: 100; opacity: 0; transform: translateX(30px) scale(0.95);
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
}
#voice-status-area.visible { opacity: 1; transform: translateX(0) scale(1); }

/* Discord / Premium Walkie-Talkie Style */
.voice-status-card {
  background: rgba(18, 18, 27, 0.85);
  backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-left: 4px solid var(--accent-blue);
  border-radius: 12px; padding: 12px 18px 12px 12px;
  display: flex; align-items: center; gap: 14px;
}
.voice-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  position: relative;
  background: rgba(255, 255, 255, 0.05);
  display: flex; align-items: center; justify-content: center;
  border: 2px solid transparent;
}
.voice-avatar img {
  width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
}
.voice-avatar .voice-icon {
  position: absolute; bottom: -4px; right: -4px;
  width: 18px; height: 18px; border-radius: 50%;
  background: #12121b; display: flex; align-items: center; justify-content: center;
  color: #fff;
}
.voice-avatar .voice-icon svg { width: 10px; height: 10px; }

.voice-user { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.01em; }
.voice-channel { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.05em; }

@keyframes speak-ring-pulse {
  0% { box-shadow: 0 0 0 0px var(--ring-color); transform: scale(1); }
  50% { box-shadow: 0 0 0 4px rgba(0,0,0,0); transform: scale(1.05); }
  100% { box-shadow: 0 0 0 0px rgba(0,0,0,0); transform: scale(1); }
}
</style>
</head>
<body>

<!-- INFO BAR -->
<div id="info-bar">
  <div class="info-card">
    <div class="info-icon"><i data-lucide="users"></i></div>
    <div><div class="info-label">On Duty</div><div class="info-value blue" id="supporter-count">0 Supporter</div></div>
    <span class="live-dot"></span>
  </div>
  <div class="info-card">
    <div class="info-icon"><i data-lucide="timer"></i></div>
    <div><div class="info-label">Spielzeit</div><div class="info-value" id="playtime">00:00:00</div></div>
  </div>
  <div class="info-card">
    <div class="info-icon"><i data-lucide="clock"></i></div>
    <div><div class="info-label">Uhrzeit</div><div class="info-value" id="clock">--:--</div></div>
  </div>
</div>

<!-- NOTIFICATION AREA -->
<div id="notif-area"></div>

<!-- BIG ANNOUNCEMENT -->
<div id="big-ann">
  <div class="big-ann-card">
    <div class="big-ann-badge"><i data-lucide="megaphone"></i> <span>Announcement</span></div>
    <div class="big-ann-title" id="big-ann-title"></div>
    <div class="big-ann-text"  id="big-ann-text"></div>
  </div>
</div>

<!-- F3 COMMAND BAR (admin only) -->
<div id="cmd-bar">
  <div class="cmd-inner">
    <span class="cmd-ico"><i data-lucide="terminal"></i></span>
    <input id="cmd-input" type="text" placeholder="Command eingeben…  /kick  /tp  /announce" autocomplete="off" spellcheck="false" />
    <span class="cmd-badge">Admin F3</span>
    <span class="cmd-esc" onclick="Overlay.toggleCmd()">ESC</span>
  </div>
</div>

<!-- MOD TOGGLE BUTTON (nur für Admins) -->
<div id="mod-toggle">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
</div>

<!-- MOD PANEL -->
<div id="mod-panel">
  <div class="mod-header">
    <div class="mod-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Moderation
    </div>
    <button class="mod-close" onclick="Overlay.toggleModPanel()">&times;</button>
  </div>
  <div class="mod-search">
    <input type="text" class="mod-search-input" id="modSearchInput" placeholder="Roblox Username suchen..." oninput="Overlay.searchModUser(this.value)">
  </div>
  <div class="mod-results" id="modResults">
    <div style="text-align:center;padding:40px 20px;color:rgba(255,255,255,0.2);font-size:12px;">Username eingeben zum Suchen</div>
  </div>
  <div class="mod-actions">
    <div class="mod-selected-user hidden" id="modSelectedUser">Kein User ausgewählt</div>
    <input type="text" class="mod-reason-input" id="modReasonInput" placeholder="Grund eingeben...">
    <div class="mod-btns">
      <button class="mod-btn warn" onclick="Overlay.modAction('Warn')" disabled id="modBtnWarn">Warn</button>
      <button class="mod-btn kick" onclick="Overlay.modAction('Kick')" disabled id="modBtnKick">Kick</button>
      <button class="mod-btn ban" onclick="Overlay.modAction('Ban')" disabled id="modBtnBan">Ban</button>
    </div>
    <div class="mod-status" id="modStatus"></div>
  </div>
</div>

<!-- VOICE STATUS AREA -->
<div id="voice-status-area">
  <div class="voice-status-card">
    <div class="voice-avatar" id="voice-avatar-container">
      <div class="voice-icon"><i data-lucide="mic"></i></div>
    </div>
    <div class="voice-info">
      <div class="voice-channel" id="voice-channel-name">FUNK</div>
      <div class="voice-user" id="voice-username">USER</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="roblox-overlay-renderer.js"></script>
</body>
</html>
