<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Emden Network Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100vw; height: 100vh;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  user-select: none;
  -webkit-app-region: no-drag;
}

:root {
  --glass-bg: rgba(10, 10, 20, 0.85);
  --glass-border: rgba(255, 255, 255, 0.1);
  --accent-teal: #00D1A7;
  --text-main: #ffffff;
  --text-muted: rgba(255, 255, 255, 0.5);
}

/* ── TOP INFO BAR ── */
#info-bar {
  position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-20px);
  display: flex; gap: 15px; opacity: 0;
  transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
#info-bar.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

.info-card {
  background: var(--glass-bg);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 14px; padding: 10px 18px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.info-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0, 209, 167, 0.15);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-teal);
}

.info-label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); line-height: 1; margin-bottom: 2px; }
.info-value { font-size: 14px; font-weight: 700; color: #fff; }

/* ── NOTIFICATIONS ── */
#notif-area {
  position: fixed; bottom: 30px; left: 30px;
  display: flex; flex-direction: column-reverse; gap: 10px;
}
.notif-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border-left: 4px solid var(--accent-teal);
  border-radius: 12px; padding: 15px;
  width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  animation: notifIn 0.5s ease forwards;
}
@keyframes notifIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }

.notif-title { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 3px; }
.notif-text { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

/* ── SPEAKING INDICATOR ── */
#voice-status-area {
  position: fixed; bottom: 40px; right: 40px;
  opacity: 0; transform: scale(0.9) translateY(20px);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#voice-status-area.visible { opacity: 1; transform: scale(1) translateY(0); }

.voice-status-card {
  background: rgba(10, 10, 26, 0.9);
  backdrop-filter: blur(32px);
  border: 1px solid rgba(0, 209, 167, 0.3);
  border-radius: 18px; padding: 12px 22px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

.voice-icon-box {
  position: relative; width: 40px; height: 40px;
  background: var(--accent-teal);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: #000; box-shadow: 0 0 20px rgba(0, 209, 167, 0.4);
}

.voice-icon-box::after {
  content: ''; position: absolute; width: 100%; height: 100%;
  border-radius: 50%; border: 2px solid var(--accent-teal);
  animation: pulse-wave 1.5s infinite;
}

@keyframes pulse-wave { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }

.voice-channel { font-size: 10px; font-weight: 900; color: var(--accent-teal); text-transform: uppercase; }
.voice-user { font-size: 16px; font-weight: 800; color: #fff; }

/* ── COMMAND BAR ── */
#cmd-bar {
  position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
  width: 700px; opacity: 0; transition: all 0.5s ease;
}
#cmd-bar.visible { top: 40px; opacity: 1; }
.cmd-inner {
  background: rgba(12, 12, 15, 0.98);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px; padding: 16px 25px;
  display: flex; align-items: center; gap: 15px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.8);
}
#cmd-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 18px; color: #fff; font-weight: 600;
  caret-color: var(--accent-teal);
}
</style>
</head>
<body>

<div id="info-bar">
  <div class="info-card">
    <div class="info-icon"><i data-lucide="users"></i></div>
    <div><div class="info-label">On Duty</div><div class="info-value" id="supporter-count">0 Supporter</div></div>
  </div>
  <div class="info-card">
    <div class="info-icon"><i data-lucide="timer"></i></div>
    <div><div class="info-label">Session</div><div class="info-value" id="playtime">00:00:00</div></div>
  </div>
  <div class="info-card">
    <div class="info-icon"><i data-lucide="clock"></i></div>
    <div><div class="info-label">Uhrzeit</div><div class="info-value" id="clock">--:--</div></div>
  </div>
</div>

<div id="notif-area"></div>

<div id="big-ann" style="display:none"></div>

<div id="cmd-bar">
  <div class="cmd-inner">
    <input id="cmd-input" type="text" placeholder="Command eingeben /kick /tp..." autofocus />
  </div>
</div>

<div id="voice-status-area">
  <div class="voice-status-card">
    <div class="voice-icon-box"><i data-lucide="mic"></i></div>
    <div class="voice-info">
      <div class="voice-channel" id="voice-channel-name">FUNK</div>
      <div class="voice-user" id="voice-username">UNBEKANNT</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="roblox-overlay-renderer.js"></script>
</body>
</html>
