<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Moderation — Emden Network</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0c0c1a; color: #fff; font-family: 'Inter', sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    -webkit-font-smoothing: antialiased; user-select: none;
}

/* Draggable Title Bar */
.titlebar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: #0f0f1e; -webkit-app-region: drag;
    border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
}
.titlebar-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.titlebar-title svg { color: #3b82f6; width: 16px; height: 16px; }
.titlebar-close {
    -webkit-app-region: no-drag;
    width: 24px; height: 24px; border-radius: 6px; border: none;
    background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; transition: all 0.2s;
}
.titlebar-close:hover { background: rgba(255,107,107,0.15); color: #ff6b6b; }

/* Search */
.search-area { padding: 10px 14px; flex-shrink: 0; }
.search-input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06);
    color: #fff; font-size: 13px; font-family: inherit; outline: none;
}
.search-input:focus { border-color: #3b82f6; }
.search-input::placeholder { color: rgba(255,255,255,0.25); }

/* Results */
.results {
    flex: 1; overflow-y: auto; padding: 0 10px; min-height: 0;
    scrollbar-width: none;
}
.results::-webkit-scrollbar { display: none; }
.placeholder { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.2); font-size: 12px; }

.user-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    transition: background 0.2s; border: 1px solid transparent;
}
.user-item:hover { background: rgba(255,255,255,0.04); }
.user-item.selected { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
.user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    overflow: hidden; flex-shrink: 0;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-size: 13px; font-weight: 600; }
.user-id { font-size: 10px; color: rgba(255,255,255,0.3); font-family: 'JetBrains Mono', monospace; }

/* Actions */
.actions {
    padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
}
.selected-user {
    display: none; align-items: center; gap: 8px;
    padding: 8px 12px; background: rgba(59,130,246,0.08);
    border-radius: 8px; margin-bottom: 8px; font-size: 12px; color: #3b82f6; font-weight: 600;
}
.selected-user.show { display: flex; }
.reason-input {
    width: 100%; padding: 9px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    color: #fff; font-size: 12px; font-family: inherit; outline: none; margin-bottom: 8px;
}
.reason-input:focus { border-color: #3b82f6; }
.reason-input::placeholder { color: rgba(255,255,255,0.2); }

.btns { display: flex; gap: 6px; }
.btn {
    flex: 1; padding: 10px 0; border: none; border-radius: 8px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn.warn { background: rgba(59,130,246,0.12); color: #3b82f6; border: 1px solid rgba(59,130,246,0.2); }
.btn.warn:hover:not(:disabled) { background: rgba(59,130,246,0.22); }
.btn.kick { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
.btn.kick:hover:not(:disabled) { background: rgba(245,158,11,0.22); }
.btn.ban { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
.btn.ban:hover:not(:disabled) { background: rgba(239,68,68,0.22); }

.status { padding: 6px 14px; text-align: center; font-size: 11px; color: #10b981; font-weight: 600; min-height: 24px; }
</style>
</head>
<body>

<div class="titlebar">
    <div class="titlebar-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Moderation
    </div>
    <button class="titlebar-close" onclick="window.close()">&times;</button>
</div>

<div class="search-area">
    <input type="text" class="search-input" id="searchInput" placeholder="Roblox Username suchen..." autofocus>
</div>

<div class="results" id="results">
    <div class="placeholder">Username eingeben zum Suchen</div>
</div>

<div class="actions">
    <div class="selected-user" id="selectedUser">Kein User</div>
    <input type="text" class="reason-input" id="reasonInput" placeholder="Grund eingeben...">
    <div class="btns">
        <button class="btn warn" id="btnWarn" disabled>Warn</button>
        <button class="btn kick" id="btnKick" disabled>Kick</button>
        <button class="btn ban" id="btnBan" disabled>Ban</button>
    </div>
    <div class="status" id="status"></div>
</div>

<script>
const WEBHOOK = 'https://discord.com/api/webhooks/1490116180466204712/rQW5nx0lsvkyjqAZTmq1ESKOvN9v2fd7rtQnEyrLb7yCH0tCASIUsMdARnAOunFF9BEG';
let selectedUser = null;
let searchTimer = null;

// Get moderator name from session
let moderatorName = 'Moderator';
try {
    const session = JSON.parse(localStorage.getItem('en_session') || 'null');
    if (session?.user?.username) moderatorName = session.user.username;
} catch(e) {}

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (q.length < 2) {
        document.getElementById('results').innerHTML = '<div class="placeholder">Username eingeben zum Suchen</div>';
        return;
    }
    document.getElementById('results').innerHTML = '<div class="placeholder">Suche...</div>';
    searchTimer = setTimeout(() => searchUser(q), 400);
});

async function searchUser(query) {
    try {
        const res = await fetch('https://users.roblox.com/v1/usernames/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usernames: [query], excludeBannedUsers: false })
        });
        const data = await res.json();
        if (!data.data?.length) {
            document.getElementById('results').innerHTML = '<div class="placeholder">Kein User gefunden</div>';
            return;
        }
        const ids = data.data.map(u => u.id);
        let avatars = {};
        try {
            const avRes = await fetch('https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=' + ids.join(',') + '&size=48x48&format=Png&isCircular=false');
            const avData = await avRes.json();
            avData.data?.forEach(a => { avatars[a.targetId] = a.imageUrl; });
        } catch(e) {}

        document.getElementById('results').innerHTML = data.data.map(u => {
            const av = avatars[u.id] || '';
            return '<div class="user-item' + (selectedUser?.id === u.id ? ' selected' : '') + '" onclick="selectUser(' + u.id + ',\'' + esc(u.name) + '\',\'' + esc(u.displayName || u.name) + '\',\'' + esc(av) + '\')">' +
                '<div class="user-avatar">' + (av ? '<img src="' + av + '">' : (u.name[0] || '?').toUpperCase()) + '</div>' +
                '<div><div class="user-name">' + esc(u.displayName || u.name) + '</div><div class="user-id">@' + esc(u.name) + ' · ' + u.id + '</div></div></div>';
        }).join('');
    } catch(e) {
        document.getElementById('results').innerHTML = '<div class="placeholder" style="color:#ff6b6b">API Fehler</div>';
    }
}

function selectUser(id, username, displayName, avatar) {
    selectedUser = { id, username, displayName, avatar };
    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
    event?.target?.closest('.user-item')?.classList.add('selected');
    const sel = document.getElementById('selectedUser');
    sel.textContent = displayName + ' (@' + username + ') · ' + id;
    sel.classList.add('show');
    document.getElementById('btnWarn').disabled = false;
    document.getElementById('btnKick').disabled = false;
    document.getElementById('btnBan').disabled = false;
}

document.getElementById('btnWarn').onclick = () => doAction('Warn');
document.getElementById('btnKick').onclick = () => doAction('Kick');
document.getElementById('btnBan').onclick = () => doAction('Ban');

async function doAction(type) {
    if (!selectedUser) return;
    const reason = document.getElementById('reasonInput').value.trim() || 'Kein Grund angegeben';
    const color = type === 'Ban' ? 0xFF4444 : type === 'Kick' ? 0xF59E0B : 0x3B82F6;
    const emoji = type === 'Ban' ? '🔨' : type === 'Kick' ? '👢' : '⚠️';

    try {
        await fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: 'Emden Network Moderation',
                avatar_url: 'https://github.com/princearmy2024.png',
                embeds: [{
                    color,
                    author: { name: emoji + ' ' + type, icon_url: selectedUser.avatar || 'https://github.com/princearmy2024.png' },
                    title: 'Moderation | ' + selectedUser.id,
                    fields: [
                        { name: 'User ID', value: '`' + selectedUser.id + '`', inline: true },
                        { name: 'Display Name', value: selectedUser.displayName, inline: true },
                        { name: 'Username', value: '@' + selectedUser.username, inline: true },
                        { name: 'Reason', value: reason, inline: false },
                        { name: 'Punishment', value: type, inline: true },
                    ],
                    footer: { text: 'Moderator: @' + moderatorName, icon_url: 'https://github.com/princearmy2024.png' },
                    timestamp: new Date().toISOString(),
                }]
            })
        });
        document.getElementById('status').textContent = '✓ ' + type + ' für ' + selectedUser.displayName + ' gesendet';
        document.getElementById('reasonInput').value = '';
        setTimeout(() => { document.getElementById('status').textContent = ''; }, 3000);
    } catch(e) {
        document.getElementById('status').textContent = '✗ Fehler';
        document.getElementById('status').style.color = '#ff6b6b';
    }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
