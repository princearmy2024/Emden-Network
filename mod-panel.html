<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Moderation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --brand:#0088FF; --brand2:#006AD5; --glass:rgba(13,15,28,0.55); --border:rgba(255,255,255,0.07); --text:#E4E4F0; --sub:#8B8FA8; --muted:#50546A; --danger:#FF6B6B; --warn:#F59E0B; --r:14px; }
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none}
.panel{margin:4px;height:calc(100% - 8px);display:flex;flex-direction:column;background:var(--glass);backdrop-filter:blur(40px) saturate(1.5);-webkit-backdrop-filter:blur(40px) saturate(1.5);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,0.4);overflow:hidden}
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);-webkit-app-region:drag}
.hdr-ico{width:28px;height:28px;border-radius:8px;background:rgba(0,136,255,0.1);border:1px solid rgba(0,136,255,0.15);display:flex;align-items:center;justify-content:center;color:var(--brand);flex-shrink:0}
.hdr-t{font-size:13px;font-weight:700;flex:1;color:#fff}
.hdr-x{-webkit-app-region:no-drag;width:24px;height:24px;border-radius:6px;background:transparent;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.hdr-x:hover{background:rgba(255,107,107,0.1);color:var(--danger)}
.search{padding:10px 12px}
.search input{width:100%;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.search input:focus{border-color:rgba(0,136,255,0.4)}
.search input::placeholder{color:var(--muted)}
.res{flex:1;overflow-y:auto;padding:0 8px;scrollbar-width:none}
.res::-webkit-scrollbar{display:none}
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:11px}
.usr{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.usr:hover{background:rgba(255,255,255,0.04)}
.usr.on{background:rgba(0,136,255,0.08);border-color:rgba(0,136,255,0.15)}
.av{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--brand),#1e40af);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.nm{font-size:13px;font-weight:600}
.id{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.ft{padding:12px;border-top:1px solid var(--border)}
.sel{display:none;padding:8px 10px;margin-bottom:8px;background:rgba(0,136,255,0.06);border-radius:8px;font-size:11px;color:var(--brand);font-weight:600;border:1px solid rgba(0,136,255,0.1)}
.sel.show{display:block}
.inp{width:100%;padding:9px 12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text);font-size:12px;font-family:inherit;outline:none;margin-bottom:8px}
.inp:focus{border-color:rgba(0,136,255,0.3)}
.inp::placeholder{color:var(--muted)}
.acts{display:flex;gap:4px;margin-bottom:8px}
.act{flex:1;padding:8px 0;border-radius:8px;text-align:center;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted)}
.act:hover{background:rgba(255,255,255,0.06)}
.act.warn.on{background:rgba(0,136,255,0.1);color:var(--brand);border-color:rgba(0,136,255,0.2)}
.act.kick.on{background:rgba(245,158,11,0.1);color:var(--warn);border-color:rgba(245,158,11,0.2)}
.act.ban.on{background:rgba(255,107,107,0.1);color:var(--danger);border-color:rgba(255,107,107,0.2)}
.send{width:100%;padding:10px;border:none;border-radius:10px;background:var(--brand);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;letter-spacing:.03em}
.send:hover:not(:disabled){background:var(--brand2)}
.send:disabled{opacity:.25;cursor:not-allowed}
.send:active:not(:disabled){transform:scale(.98)}
.msg{text-align:center;font-size:11px;font-weight:600;min-height:18px;margin-top:6px}
.msg.ok{color:#10b981}.msg.err{color:var(--danger)}
.mod-info{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--sub)}
.mod-info .mod-av{width:20px;height:20px;border-radius:50%;background:var(--brand);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff}
.mod-info .mod-av img{width:100%;height:100%;object-fit:cover}
.mod-info span{font-weight:600;color:var(--text)}
</style>
</head>
<body>
<div class="panel">
    <div class="hdr">
        <div class="hdr-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <span class="hdr-t">Moderation</span>
        <button class="hdr-x" onclick="window.close()">&times;</button>
    </div>
    <div class="search"><input id="q" placeholder="Roblox Username suchen..." autofocus></div>
    <div class="res" id="res"><div class="empty">Username eingeben</div></div>
    <div class="ft">
        <div class="sel" id="sel"></div>
        <input class="inp" id="reason" placeholder="Grund eingeben...">
        <div class="acts">
            <div class="act warn" onclick="pick('Warn',this)">Warn</div>
            <div class="act kick" onclick="pick('Kick',this)">Kick</div>
            <div class="act ban" onclick="pick('Ban',this)">Ban</div>
        </div>
        <button class="send" id="send" disabled onclick="go()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Senden
        </button>
        <div class="msg" id="msg"></div>
    </div>
    <div class="mod-info" id="modInfo">
        <div class="mod-av" id="modAv">M</div>
        Eingeloggt als <span id="modName">Moderator</span>
    </div>
</div>
<script>
const WH='https://discord.com/api/webhooks/1490116180466204712/rQW5nx0lsvkyjqAZTmq1ESKOvN9v2fd7rtQnEyrLb7yCH0tCASIUsMdARnAOunFF9BEG';
let user=null,action=null,timer=null;
let mod={name:'Moderator',avatar:'',discordId:''};
try{
    const s=JSON.parse(localStorage.getItem('en_session')||'null');
    if(s?.user){
        mod.name=s.user.username||'Moderator';
        mod.avatar=s.user.avatar||'';
        mod.discordId=s.user.discordId||'';
    }
}catch(e){}
// Mod-Info unten anzeigen
document.getElementById('modName').textContent=mod.name;
if(mod.avatar){document.getElementById('modAv').innerHTML='<img src="'+mod.avatar+'">';}
else{document.getElementById('modAv').textContent=(mod.name[0]||'M').toUpperCase();}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;')}

document.getElementById('q').oninput=e=>{
    clearTimeout(timer);const v=e.target.value.trim();
    if(v.length<2){document.getElementById('res').innerHTML='<div class="empty">Username eingeben</div>';return}
    document.getElementById('res').innerHTML='<div class="empty">Suche...</div>';
    timer=setTimeout(()=>search(v),400);
};

async function search(q){
    try{
        const r=await fetch('https://users.roblox.com/v1/usernames/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usernames:[q],excludeBannedUsers:false})});
        const d=await r.json();if(!d.data?.length){document.getElementById('res').innerHTML='<div class="empty">Nicht gefunden</div>';return}

        // User-Details + Avatar laden
        const u=d.data[0];
        let avatar='',created='';
        try{
            const [pRes,aRes]=await Promise.all([
                fetch('https://users.roblox.com/v1/users/'+u.id),
                fetch('https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds='+u.id+'&size=150x150&format=Png&isCircular=false')
            ]);
            const pData=await pRes.json();
            const aData=await aRes.json();
            avatar=aData.data?.[0]?.imageUrl||'';
            created=pData.created?new Date(pData.created).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
        }catch(e){}

        document.getElementById('res').innerHTML=`<div class="usr${user?.id===u.id?' on':''}" onclick="sel(${u.id},'${esc(u.name)}','${esc(u.displayName||u.name)}','${esc(avatar)}','${esc(created)}')">
            <div class="av">${avatar?'<img src="'+avatar+'">':esc((u.name[0]||'?').toUpperCase())}</div>
            <div><div class="nm">${esc(u.displayName||u.name)}</div><div class="id">@${esc(u.name)} · ${u.id}${created?' · '+created:''}</div></div>
        </div>`;
    }catch(e){document.getElementById('res').innerHTML='<div class="empty" style="color:#ff6b6b">Fehler</div>'}
}

function sel(id,name,display,av,created){
    user={id,name,display,av,created};
    document.querySelectorAll('.usr').forEach(e=>e.classList.remove('on'));
    event?.target?.closest('.usr')?.classList.add('on');
    const s=document.getElementById('sel');s.textContent=`${display} (@${name}) · ${id}`;s.classList.add('show');
    upd();
}
function pick(t,el){action=t;document.querySelectorAll('.act').forEach(a=>a.classList.remove('on'));el.classList.add('on');upd()}
function upd(){document.getElementById('send').disabled=!(user&&action)}

async function go(){
    if(!user||!action)return;
    const reason=document.getElementById('reason').value.trim()||'Kein Grund';
    const c=action==='Ban'?0xFF4444:action==='Kick'?0xF59E0B:0x0088FF;
    const e=action==='Ban'?'🔨':action==='Kick'?'👢':'⚠️';
    document.getElementById('send').disabled=true;
    try{
        await fetch(WH,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
            username:'Emden Network Moderation',
            avatar_url:user.av||'https://github.com/princearmy2024.png',
            embeds:[{
                color:c,
                author:{name:user.display,icon_url:user.av||'https://github.com/princearmy2024.png'},
                title:`Moderation | ${user.id}`,
                thumbnail:{url:user.av||''},
                fields:[
                    {name:'User ID',value:'`'+user.id+'`',inline:true},
                    {name:'Display Name',value:user.display,inline:true},
                    {name:'Account Created',value:user.created||'Unbekannt',inline:true},
                    {name:'Reason',value:reason,inline:false},
                    {name:'Punishment',value:action,inline:true},
                ],
                footer:{text:'Moderator: @'+mod.name,icon_url:mod.avatar||'https://github.com/princearmy2024.png'},
                timestamp:new Date().toISOString(),
            }]
        })});
        show('✓ '+action+' gesendet','ok');
        document.getElementById('reason').value='';
        action=null;document.querySelectorAll('.act').forEach(a=>a.classList.remove('on'));
    }catch(e){show('✗ Fehler','err')}
    upd();
}
function show(t,c){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+c;setTimeout(()=>{m.textContent='';m.className='msg'},3000)}
</script>
</body>
</html>
